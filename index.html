<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>

</head>

<body>
    <header>
        <h1>Blog de futball</h1>
        <p>vou falar sobre balls e fut</p>
        <style>
            header {
                background-color: #002E60;
                color: #FFFFFF;
                text-align: center;
                max-width: 800px;
                margin: 0 auto;
                padding: 16px;
                }

            main {
                background-color: #FFFFFF;
                color: #182963;

            }

            article {
                display: flex;
            }

            img {
                width: 200px;
                height: 200px;
            }

            .artigo-autor {
                font-weight: bold;
            }
        </style>
    </header>

    <main>
        <article>
            <img src="lulinha.webp"
                alt="a imagem mostra uma copa do mundo que o haiti ganhou".">

            <div>
                <h2>post do kl_rei_delas</h2>
                <p class="artigo-autor">Por: klaus mathias</p>
                <p>haiti ganha a copa do mundo.</p>
                <button>❤️<span>0</span></button>
                <button>👍<span>0</span></button>
            </div>
        </article>
        <article>
            <img src="imagem-blog.png"
                alt="uma imagem de um jogador haiti entra em uma briga com um jogador do japão.">

            <div>
                <h2>post do bruno</h2>
                <p class="artigo-autor">Por: bruno hilário dias</p>
                <p>uma briga entre jogadores do japão e do haiti surge na final da copa do mundo </p>
                <button>❤️<span>0</span></button>
                <button>👍<span>0</span></button>
            </div>
        </article>

    </main>
</body>

<script>
    const botoes = document.querySelectorAll("button");

    botoes.forEach(function (botao) {
        botao.addEventListener("click", botaoClicado);
        function botaoClicado() {
            console.log("fui clicado");
            let texto = botao.querySelector("span");
            texto.textContent++;
        }
    });



</script>

</html>
